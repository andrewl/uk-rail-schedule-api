<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train Schedule</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            background-color: #f4f4f4;
        }
        select {
            padding: 0.5rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 0.5rem;
            text-align: left;
        }
        th {
            background-color: #f4f4f4;
        }
        .details-cell {
            background-color: #f9f9f9;
        }
        .details-cell div {
            padding: 1rem;
        }
        .schedule-row.next-train {
            background-color: #e8f4e8;
        }
        .schedule-row.bold {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <select id="stationFilter">
            <option value="">All Stations (via)</option>
        </select>
        <select id="platformFilter">
            <option value="">All Platforms</option>
        </select>
    </header>
    <table id="scheduleTable">
        <thead>
            <tr>
                <th>Time</th>
                <th>Platform</th>
                <th>Destination</th>
                <th>Type</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        async function fetchSchedules(tiploc) {
            const response = await fetch(`http://127.0.0.1:3333/schedules/tiploc/${tiploc}`);
            return await response.json();
        }

        function parseTimeString(timeString) {
            if (!timeString) return null;
            const now = new Date();
            const hours = parseInt(timeString.slice(0, 2));
            const minutes = parseInt(timeString.slice(2, 4));
            return new Date(now.getFullYear(), now.getMonth(), now.getDate(), hours, minutes);
        }

        function updateQueryParams(params) {
            const url = new URL(window.location);
            Object.keys(params).forEach(key => {
                if (params[key]) {
                    url.searchParams.set(key, params[key]);
                } else {
                    url.searchParams.delete(key);
                }
            });
            window.history.replaceState({}, '', url);
        }

        function toggleDetails(row, schedule, tiploc) {
            const existingDetailsRow = row.nextSibling;
            if (existingDetailsRow && existingDetailsRow.classList.contains('details-row')) {
                existingDetailsRow.remove();
                return;
            }

            const detailsRow = document.createElement('tr');
            detailsRow.className = 'details-row';
            const detailsCell = document.createElement('td');
            detailsCell.colSpan = 4;
            detailsCell.className = 'details-cell';

            currentTime = new Date();

            detailsCell.innerHTML = `
                <div>
                    <p><strong>${schedule.atoc_code_description || 'N/A'} train from ${
                schedule.origin || 'Unknown'
                    } to ${schedule.destination || 'Unknown'}</strong></p>
                <p>A ${schedule.CIF_power_type_description} ${schedule.CIF_timing_load_description || ''} ${schedule.CIF_train_category_description || ''} train running at a max speed of ${schedule.CIF_speed}mph. ${schedule.CIF_operating_characteristics_description || ''}</p>
                    <p><strong>Train ID:</strong> ${schedule.CIF_train_uid || 'N/A'}</p>
                    <p><strong>Headcode:</strong> ${schedule.signalling_id || 'N/A'}</p>
                    <p><strong>Terain ID:</strong> ${schedule.CIF_train_uid || 'N/A'}</p>
                </div>
                <div>
                    ${schedule.schedule_location
                        .filter(loc => loc.departure)
                        .map(
                            loc =>
                            (loc.departure && parseTimeString(loc.departure) > currentTime ? '<strong>' : '') +
                                `<span>${loc.departure || loc.pass || loc.arrival || 'N/A'}:
                            ${loc.Tiploc.tps_description}` + (loc.platform ? ` (Platform: ${loc.platform})` : '') +
                            (loc.departure && parseTimeString(loc.departure) > currentTime ? '</strong>' : '') + '</span><br/>'
                        )
                        .join('')}
                </div>
            `;

            detailsRow.appendChild(detailsCell);
            row.parentNode.insertBefore(detailsRow, row.nextSibling);
        }

        function populateFilters(data, tiploc, selectedVia, selectedPlatform) {
            const stationFilter = document.getElementById('stationFilter');
            const platformFilter = document.getElementById('platformFilter');

            // Populate station filter
            const viaStations = new Set();
            data.schedules.forEach(schedule =>
                schedule.schedule_location.forEach(location => {
                    if (location.departure || location.public_departure) {
                        viaStations.add(location.Tiploc.tps_description);
                    }
                })
            );

            stationFilter.innerHTML = `<option value="">All Stations (via)</option>`;
            viaStations.forEach(station => {
                stationFilter.innerHTML += `<option value="${station}" ${
                    station === selectedVia ? 'selected' : ''
                }>${station}</option>`;
            });

            // Populate platform filter
            const platformOptions = new Set();
            data.schedules.forEach(schedule => {
                const stop = schedule.schedule_location.find(loc => loc.tiploc_code === tiploc);
                if (stop && stop.platform) {
                    platformOptions.add(stop.platform);
                }
            });

            platformFilter.innerHTML = `<option value="">All Platforms</option>`;
            platformOptions.forEach(platform => {
                platformFilter.innerHTML += `<option value="${platform}" ${
                    platform === selectedPlatform ? 'selected' : ''
                }>${platform}</option>`;
            });

            // Add event listeners for filters
            stationFilter.addEventListener('change', () => {
                updateQueryParams({ via: stationFilter.value });
                refreshSchedules(data, tiploc);
            });

            platformFilter.addEventListener('change', () => {
                updateQueryParams({ platform: platformFilter.value });
                refreshSchedules(data, tiploc);
            });
        }

        function refreshSchedules(data, tiploc) {
            const params = new URLSearchParams(window.location.search);
            const selectedVia = params.get('via');
            const selectedPlatform = params.get('platform');

            populateFilters(data, tiploc, selectedVia, selectedPlatform);

            console.log(tiploc, selectedVia, selectedPlatform);

            const filteredSchedules = data.schedules
                .filter(schedule => {
                    const stop = schedule.schedule_location.find(loc => loc.Tiploc.tps_description === tiploc);
                    if (!stop) return false;

                    const viaMatch =
                        !selectedVia || schedule.schedule_location.some(loc => loc.Tiploc.tps_description === selectedVia);
                    const platformMatch = !selectedPlatform || stop.platform === selectedPlatform;

                    return viaMatch && platformMatch;
                })
                .sort((a, b) => {
                    const timeA = parseTimeString(
                        a.schedule_location.find(loc => loc.tiploc_code === tiploc)?.departure ||
                        a.schedule_location.find(loc => loc.tiploc_code === tiploc)?.pass ||
                        a.schedule_location.find(loc => loc.tiploc_code === tiploc)?.arrival
                    );
                    const timeB = parseTimeString(
                        b.schedule_location.find(loc => loc.tiploc_code === tiploc)?.departure ||
                        b.schedule_location.find(loc => loc.tiploc_code === tiploc)?.pass ||
                        b.schedule_location.find(loc => loc.tiploc_code === tiploc)?.arrival
                    );
                    return (timeA || 0) - (timeB || 0); // Ensure null values are handled
                });

            const tableBody = document.querySelector('#scheduleTable tbody');
            tableBody.innerHTML = '';

            const currentTime = new Date();
            let nextTrainFound = false;

            filteredSchedules.forEach(schedule => {
                const stop = schedule.schedule_location.find(loc => loc.tiploc_code === tiploc);
                const departureTime = parseTimeString(stop?.departure || stop?.pass);
                const isNextTrain = !nextTrainFound && departureTime && departureTime > currentTime;

                if (isNextTrain) nextTrainFound = true;

                const row = document.createElement('tr');
                row.className = 'schedule-row';
                if (departureTime && departureTime > currentTime) row.classList.add('bold');
                if (isNextTrain) row.classList.add('next-train');

                row.innerHTML = `
                    <td>${stop?.departure || stop?.pass || stop?.arrival || 'Unknown'}</td>
                    <td>${stop?.platform || 'Unknown'}</td>
                    <td>${schedule.destination || 'Unknown'}</td>
                    <td>${schedule.CIF_train_category_description || 'Unknown'}</td>
                `;

                row.addEventListener('click', () => toggleDetails(row, schedule, tiploc));
                tableBody.appendChild(row);
            });

            const nextTrainRow = document.querySelector('.schedule-row.next-train');
            if (nextTrainRow) {
                nextTrainRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

                        (async function () {
                            const params = new URLSearchParams(window.location.search);
                            const tiploc = params.get('tiploc') || 'DEFAULT_TIPLOC';
                            const data = await fetchSchedules(tiploc);
                            refreshSchedules(data, tiploc);
                        })();
    </script>
</body>
</html>
