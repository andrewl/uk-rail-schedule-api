{{template "base.html" .}}

{{define "content"}}
<section class="search">
  <h2>Search Schedules</h2>
  <form hx-post="/search"
        hx-target="#results"
        hx-swap="innerHTML"
        hx-indicator="#spinner">

    <div class="form-inline">
      <div class="form-field">
        <label for="identifier">Train ID</label>
        <input id="identifier" name="identifier" type="text"
               placeholder="e.g. 1A23">
      </div>

      <div class="form-field">
        <label for="date">Date</label>
        <input id="date" name="date" type="date"
               value="{{now}}" required>
      </div>

      <div class="form-field">
        <label for="toc">Operator</label>
        <input id="toc" name="toc" type="text"
               placeholder="e.g. GW">
      </div>

      <div class="form-field">
        <label for="location">TIPLOC</label>
        <input id="location" name="location" type="text"
               placeholder="e.g. DRBY">
      </div>

      <div class="form-field form-field--check">
        <label>
          <input type="checkbox" name="hide_passed" value="true">
          Hide passed
        </label>
      </div>

      <button type="submit">Search</button>
      <span id="spinner" class="htmx-indicator">Searching&hellip;</span>
    </div>
  </form>
</section>

<section id="results">
  <!-- htmx schedule results rendered here -->
</section>
{{end}}
